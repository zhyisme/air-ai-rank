<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5CF6"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="crystalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA"/>
      <stop offset="30%" style="stop-color:#8B5CF6"/>
      <stop offset="70%" style="stop-color:#7C3AED"/>
      <stop offset="100%" style="stop-color:#06B6D4"/>
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#C4B5FD;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#7C3AED;stop-opacity:0.2"/>
    </linearGradient>
    <radialGradient id="sphereGrad" cx="40%" cy="35%" r="60%">
      <stop offset="0%" style="stop-color:#E0D7FF;stop-opacity:0.9"/>
      <stop offset="40%" style="stop-color:#8B5CF6;stop-opacity:0.8"/>
      <stop offset="80%" style="stop-color:#4C1D95;stop-opacity:0.9"/>
      <stop offset="100%" style="stop-color:#1E1B4B;stop-opacity:1"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="innerGlow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="80" ry="80" fill="#0F0F1A"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="128" x2="512" y2="128" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="0" y1="256" x2="512" y2="256" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="0" y1="384" x2="512" y2="384" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="128" y1="0" x2="128" y2="512" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="256" y1="0" x2="256" y2="512" stroke="#8B5CF6" stroke-width="1"/>
    <line x1="384" y1="0" x2="384" y2="512" stroke="#8B5CF6" stroke-width="1"/>
  </g>

  <!-- Outer glow ring -->
  <circle cx="256" cy="200" r="110" fill="none" stroke="url(#bgGrad)" stroke-width="2" opacity="0.3" filter="url(#glow)"/>

  <!-- Crystal ball - main sphere -->
  <circle cx="256" cy="200" r="95" fill="url(#sphereGrad)" filter="url(#glow)"/>

  <!-- Crystal ball highlight -->
  <ellipse cx="230" cy="170" rx="35" ry="25" fill="url(#glowGrad)" opacity="0.5"/>

  <!-- Crystal ball inner shimmer -->
  <circle cx="256" cy="200" r="70" fill="none" stroke="#C4B5FD" stroke-width="0.5" opacity="0.3"/>

  <!-- Sparkle dots inside crystal ball -->
  <circle cx="220" cy="185" r="3" fill="#E0D7FF" opacity="0.8" filter="url(#innerGlow)"/>
  <circle cx="280" cy="210" r="2" fill="#67E8F9" opacity="0.7" filter="url(#innerGlow)"/>
  <circle cx="250" cy="230" r="2.5" fill="#C4B5FD" opacity="0.6" filter="url(#innerGlow)"/>
  <circle cx="240" cy="175" r="1.5" fill="#A5F3FC" opacity="0.9"/>
  <circle cx="270" cy="190" r="1.5" fill="#E0D7FF" opacity="0.8"/>

  <!-- Crystal ball base/stand -->
  <path d="M 216 285 Q 216 295 226 298 L 286 298 Q 296 295 296 285" fill="#1E1B4B" opacity="0.8"/>
  <ellipse cx="256" cy="300" rx="40" ry="8" fill="#2D2A5E" opacity="0.9"/>
  <ellipse cx="256" cy="298" rx="35" ry="5" fill="#4C1D95" opacity="0.5"/>

  <!-- AIR text -->
  <text x="256" y="380" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="72" font-weight="900" letter-spacing="12" fill="url(#bgGrad)">
    AIR
  </text>

  <!-- Subtitle -->
  <text x="256" y="415" text-anchor="middle" font-family="'SF Pro Display', 'Helvetica Neue', Arial, sans-serif" font-size="18" font-weight="400" letter-spacing="6" fill="#8B8BA7">
    AI段位实况
  </text>

  <!-- Decorative dots -->
  <circle cx="180" cy="445" r="2" fill="#8B5CF6" opacity="0.4"/>
  <circle cx="210" cy="450" r="1.5" fill="#06B6D4" opacity="0.3"/>
  <circle cx="302" cy="450" r="1.5" fill="#8B5CF6" opacity="0.3"/>
  <circle cx="332" cy="445" r="2" fill="#06B6D4" opacity="0.4"/>
</svg>
